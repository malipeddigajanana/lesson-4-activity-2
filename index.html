<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>Ocean Music World</title>
</head>

<body>

    <center>

        <h1>🌊 Ocean Music World</h1>

        <h2>🎵 Welcome to the Underwater Show</h2>

        <p>
            Enjoy relaxing ocean music while watching amazing aquatic life under the sea.
        </p>

        <!-- Audio Section -->
        <audio controls loop>
            <source src="song.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>

        <br><br>

        <!-- Video Section -->
        <video width="500" height="350" controls poster="poster.png" loop>
            <source src="video.mp4" type="video/mp4">
            Your browser does not support the video element.
        </video>

        <h4>🐠 Live Ocean Adventure</h4>

        <p>
            This webpage demonstrates the use of audio and video tags in HTML.
        </p>

        <h6>✨ Created by Gajanana</h6>

    </center>

</body>

</html>
